<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>减数分裂：染色体配对模拟器</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f0f7e8;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            /* 允许垂直滚动 */
            touch-action: pan-y; 
        }
        .container {
            background: white;
            border-radius: 32px;
            padding: 30px 20px 20px 20px;
            box-shadow: 0 12px 28px rgba(0, 40, 20, 0.2);
            max-width: 1100px;
            width: fit-content;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            background: #fefef7;
            box-shadow: inset 0 2px 8px #c0d0b0, 0 6px 12px rgba(0,0,0,0.1);
            cursor: grab;
            /* 移除 touch-action: none，让浏览器默认处理滚动，我们在事件中动态控制 */
            width: 100%;
            height: auto;
        }
        canvas:active {
            cursor: grabbing;
        }
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
            align-items: center;
            flex-wrap: wrap;
        }
        button {
            background: #2b6e4f;
            border: none;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            padding: 12px 40px;
            border-radius: 48px;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #1b4532, 0 8px 12px rgba(0, 40, 0, 0.3);
            cursor: pointer;
            transition: all 0.08s ease-in;
            border: 1px solid #a5d6b6;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1b4532, 0 5px 10px rgba(0, 40, 0, 0.3);
        }
        .message {
            background: #fff9e0;
            min-width: 280px;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #1e4a2f;
            box-shadow: inset 0 2px 6px #dadbb5, 0 4px 8px #b3c0a0;
            text-align: center;
            border: 1px solid #cfb87c;
        }
        .reset-btn {
            background: #9b6b43;
            box-shadow: 0 4px 0 #624b30, 0 8px 12px rgba(70, 40, 0, 0.2);
            font-size: 1.0rem;
            padding: 10px 25px;
        }
        .footer-note {
            margin-top: 16px;
            color: #3d5a3a;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="meiosisCanvas" width="1000" height="670"></canvas>
    <div class="control-panel">
        <button id="aiCheckBtn">🧬 AI检查</button>
        <div id="aiMessage" class="message">等待检查...</div>
        <button id="resetBtn" class="reset-btn">⟲ 重置染色体</button>
    </div>
    <div class="footer-note">
        ⚡ 拖动两组染色体（红色: AA/BB ; 蓝色: aa/bb）放入第一排细胞内。点击AI检查验证减I前期配对和后期分离。
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('meiosisCanvas');
        const ctx = canvas.getContext('2d');
        const aiMessageDiv = document.getElementById('aiMessage');

        // ---------- 固定坐标定义 ----------
        const cells = [
            { period: '减I前期', x: 220, y: 130, r: 55 },     // 0
            { period: '减I后期', x: 460, y: 130, r: 55 },     // 1
            { period: '次级1 前期II', x: 220, y: 260, r: 44 }, // 2
            { period: '次级1 后期II', x: 460, y: 260, r: 44 }, // 3
            { period: '次级2 前期II', x: 220, y: 390, r: 44 }, // 4
            { period: '次级2 后期II', x: 460, y: 390, r: 44 }, // 5
            { period: '精细胞1', x: 130, y: 540, r: 26 },      // 6
            { period: '精细胞2', x: 260, y: 540, r: 26 },      // 7
            { period: '精细胞3', x: 400, y: 540, r: 26 },      // 8
            { period: '精细胞4', x: 540, y: 540, r: 26 }       // 9
        ];

        const cellLabels = [
            '减数第一次分裂 前期',   // 0
            '减数第一次分裂 后期',   // 1
            '次级精母细胞1 前期II', // 2
            '次级精母细胞1 后期II', // 3
            '次级精母细胞2 前期II', // 4
            '次级精母细胞2 后期II', // 5
            '精细胞1',              // 6
            '精细胞2',              // 7
            '精细胞3',              // 8
            '精细胞4'               // 9
        ];

        // ---------- 染色体数据 ----------
        let chromosomes = [
            { id: 'AA1', type: 'long', gene: 'AA', color: '#d62728', width: 58, height: 20, x: 720, y: 50 },
            { id: 'aa1', type: 'long', gene: 'aa', color: '#1f77b4', width: 58, height: 20, x: 720, y: 90 },
            { id: 'BB1', type: 'short', gene: 'BB', color: '#d62728', width: 42, height: 20, x: 720, y: 130 },
            { id: 'bb1', type: 'short', gene: 'bb', color: '#1f77b4', width: 42, height: 20, x: 720, y: 170 },
            { id: 'AA2', type: 'long', gene: 'AA', color: '#d62728', width: 58, height: 20, x: 820, y: 50 },
            { id: 'aa2', type: 'long', gene: 'aa', color: '#1f77b4', width: 58, height: 20, x: 820, y: 90 },
            { id: 'BB2', type: 'short', gene: 'BB', color: '#d62728', width: 42, height: 20, x: 820, y: 130 },
            { id: 'bb2', type: 'short', gene: 'bb', color: '#1f77b4', width: 42, height: 20, x: 820, y: 170 }
        ];

        // 存储模拟的后面细胞 (2-9) 内显示的染色体
        let simulatedContents = { 2: [], 3: [], 4: [], 5: [], 6: [], 7: [], 8: [], 9: [] };

        // 拖拽状态
        let draggingIndex = -1;
        let dragOffsetX = 0, dragOffsetY = 0;

        // ---------- 辅助函数：将触摸/鼠标事件统一转换为画布坐标 ----------
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   // canvas物理像素与CSS像素的比例
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;
            if (e.touches) {
                // 触摸事件
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                // 鼠标事件
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            return { x: canvasX, y: canvasY };
        }

        // 判断点是否在某个染色体上（返回索引）
        function getChromosomeAt(x, y) {
            for (let i = chromosomes.length - 1; i >= 0; i--) {
                const ch = chromosomes[i];
                if (x >= ch.x && x <= ch.x + ch.width &&
                    y >= ch.y && y <= ch.y + ch.height) {
                    return i;
                }
            }
            return -1;
        }

        // ---------- 统一拖拽开始函数 ----------
        function startDrag(e) {
            const { x, y } = getCanvasCoords(e);
            const idx = getChromosomeAt(x, y);
            if (idx !== -1) {
                // 点中了染色体：阻止默认行为（滚动/选中），开始拖拽
                e.preventDefault();
                draggingIndex = idx;
                const ch = chromosomes[idx];
                dragOffsetX = x - ch.x;
                dragOffsetY = y - ch.y;
                canvas.style.cursor = 'grabbing';
                drawAll();
            }
            // 如果没有点中染色体，不阻止默认行为，让浏览器处理滚动
        }

        // 统一拖拽移动函数
        function moveDrag(e) {
            if (draggingIndex === -1) return;
            // 正在拖拽，阻止滚动
            e.preventDefault();
            const { x, y } = getCanvasCoords(e);
            const ch = chromosomes[draggingIndex];
            ch.x = x - dragOffsetX;
            ch.y = y - dragOffsetY;
            // 边界限制
            ch.x = Math.max(0, Math.min(canvas.width - ch.width, ch.x));
            ch.y = Math.max(0, Math.min(canvas.height - ch.height, ch.y));
            drawAll();
        }

        // 统一拖拽结束函数
        function endDrag(e) {
            if (draggingIndex !== -1) {
                draggingIndex = -1;
                canvas.style.cursor = 'grab';
                drawAll();
            }
        }

        // 取消拖拽（如触摸中断）
        function cancelDrag(e) {
            if (draggingIndex !== -1) {
                draggingIndex = -1;
                canvas.style.cursor = 'grab';
                drawAll();
            }
        }

        // ---------- 绑定事件 (同时支持鼠标和触摸) ----------
        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', moveDrag);
        canvas.addEventListener('mouseup', endDrag);
        canvas.addEventListener('mouseleave', endDrag);

        // 触摸事件
        canvas.addEventListener('touchstart', startDrag, { passive: false }); // 必须为 false 才能 preventDefault
        canvas.addEventListener('touchmove', moveDrag, { passive: false });
        canvas.addEventListener('touchend', endDrag);
        canvas.addEventListener('touchcancel', cancelDrag);

        canvas.style.cursor = 'grab';

        // ---------- 辅助函数：染色体中心、圆内检测 ----------
        function isPointInCircle(px, py, cx, cy, r) {
            const dx = px - cx, dy = py - cy;
            return dx * dx + dy * dy <= r * r;
        }

        function chromCenter(chrom) {
            return { x: chrom.x + chrom.width/2, y: chrom.y + chrom.height/2 };
        }

        function getChromosomesInsideCircle(circleIndex) {
            const cell = cells[circleIndex];
            const inside = [];
            chromosomes.forEach((ch, idx) => {
                const center = chromCenter(ch);
                if (isPointInCircle(center.x, center.y, cell.x, cell.y, cell.r)) {
                    inside.push({ ...ch, index: idx });
                }
            });
            return inside;
        }

        function getColorFromGene(gene) {
            return (gene === 'AA' || gene === 'BB' || gene === 'A' || gene === 'B') ? '#d62728' : '#1f77b4';
        }

        // ---------- 绘制 ----------
        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 绘制所有细胞圆圈
            for (let i = 0; i < cells.length; i++) {
                const c = cells[i];
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r, 0, 2 * Math.PI);
                ctx.fillStyle = '#f2fae6';
                ctx.fill();
                ctx.strokeStyle = '#2b5e3a';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                let offset = (i === 0 || i === 1) ? 18 : (i >= 6 ? 18 : 22);
                ctx.font = i >= 6 ? 'bold 13px "Segoe UI", sans-serif' : 'bold 14px "Segoe UI", sans-serif';
                ctx.fillStyle = '#1d4d2d';
                ctx.textAlign = 'center';
                ctx.fillText(cellLabels[i], c.x, c.y + c.r + offset);
            }

            // 2. 绘制赤道面虚线（减I后期、两个后期II细胞）
            ctx.save();
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 3]);
            // 细胞1 (减I后期)
            let c = cells[1];
            ctx.beginPath();
            ctx.moveTo(c.x - c.r, c.y);
            ctx.lineTo(c.x + c.r, c.y);
            ctx.stroke();
            // 细胞3 (次级1后期II)
            c = cells[3];
            ctx.beginPath();
            ctx.moveTo(c.x - c.r, c.y);
            ctx.lineTo(c.x + c.r, c.y);
            ctx.stroke();
            // 细胞5 (次级2后期II)
            c = cells[5];
            ctx.beginPath();
            ctx.moveTo(c.x - c.r, c.y);
            ctx.lineTo(c.x + c.r, c.y);
            ctx.stroke();
            ctx.restore();

            // 3. 绘制所有静态模拟细胞内容 (2-9)
            for (let i = 2; i <= 9; i++) {
                const list = simulatedContents[i] || [];
                for (let chrom of list) {
                    if (i === 2 || i === 4) {
                        // 前期II: 绘制填充矩形 + X形
                        ctx.fillStyle = chrom.color;
                        ctx.shadowColor = '#40202020';
                        ctx.shadowBlur = 6;
                        ctx.fillRect(chrom.x, chrom.y, chrom.width, chrom.height);
                        ctx.strokeStyle = '#2d1a1a';
                        ctx.lineWidth = 1.5;
                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.moveTo(chrom.x + 5, chrom.y + 2);
                        ctx.lineTo(chrom.x + chrom.width - 5, chrom.y + chrom.height - 2);
                        ctx.moveTo(chrom.x + 5, chrom.y + chrom.height - 2);
                        ctx.lineTo(chrom.x + chrom.width - 5, chrom.y + 2);
                        ctx.strokeStyle = '#3a2a2a';
                        ctx.stroke();
                        ctx.font = 'bold 12px "Courier New", monospace';
                        ctx.fillStyle = '#111';
                        ctx.shadowColor = '#00000060';
                        ctx.shadowBlur = 4;
                        ctx.fillText(chrom.gene, chrom.x + chrom.width/2 - 10, chrom.y + 15);
                        ctx.shadowBlur = 0;
                    } else {
                        // 后期II (3,5) 和精细胞 (6-9): 线条表示
                        ctx.shadowBlur = 0;
                        const midY = chrom.y + chrom.height/2;
                        ctx.beginPath();
                        ctx.moveTo(chrom.x, midY);
                        ctx.lineTo(chrom.x + chrom.width, midY);
                        ctx.strokeStyle = chrom.color;
                        ctx.lineWidth = 3;
                        ctx.stroke();

                        ctx.font = 'bold 12px "Courier New", monospace';
                        ctx.fillStyle = '#111';
                        ctx.shadowColor = '#00000060';
                        ctx.shadowBlur = 4;
                        let geneText = chrom.gene.charAt(0);
                        ctx.fillText(geneText, chrom.x + chrom.width/2 - 6, midY - 6);
                        ctx.shadowBlur = 0;
                    }
                }
            }

            // 4. 绘制可拖动的染色体
            for (let i = 0; i < chromosomes.length; i++) {
                const ch = chromosomes[i];
                ctx.fillStyle = ch.color;
                ctx.shadowColor = '#604020';
                ctx.shadowBlur = 8;
                ctx.fillRect(ch.x, ch.y, ch.width, ch.height);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(ch.x + 6, ch.y + 4);
                ctx.lineTo(ch.x + ch.width - 6, ch.y + ch.height - 4);
                ctx.moveTo(ch.x + 6, ch.y + ch.height - 4);
                ctx.lineTo(ch.x + ch.width - 6, ch.y + 4);
                ctx.strokeStyle = '#1e2e1e';
                ctx.stroke();
                ctx.font = 'bold 14px "Courier New", monospace';
                ctx.fillStyle = 'white';
                ctx.shadowColor = '#00000060';
                ctx.shadowBlur = 4;
                ctx.fillText(ch.gene, ch.x + ch.width/2 - 12, ch.y + 16);
                ctx.shadowBlur = 0;
            }

            // 5. 提示文字
            ctx.font = 'italic 16px "Segoe UI", sans-serif';
            ctx.fillStyle = '#3d6230';
            ctx.fillText('染色体库 (红色:AA/BB, 蓝色:aa/bb)', 670, 230);
        }

        // ---------- AI 检查逻辑 ----------
        function aiCheck() {
            const cell0inside = getChromosomesInsideCircle(0);
            const cell1inside = getChromosomesInsideCircle(1);

            let cell0ok = false;
            if (cell0inside.length === 4) {
                const genes = cell0inside.map(c => c.gene);
                const hasAA = genes.includes('AA');
                const hasaa = genes.includes('aa');
                const hasBB = genes.includes('BB');
                const hasbb = genes.includes('bb');
                if (hasAA && hasaa && hasBB && hasbb) {
                    const chromAA = cell0inside.find(c => c.gene === 'AA');
                    const chromaa = cell0inside.find(c => c.gene === 'aa');
                    const chromBB = cell0inside.find(c => c.gene === 'BB');
                    const chrombb = cell0inside.find(c => c.gene === 'bb');
                    const distLong = Math.hypot(chromAA.x - chromaa.x, chromAA.y - chromaa.y);
                    const distShort = Math.hypot(chromBB.x - chrombb.x, chromBB.y - chrombb.y);
                    if (distLong < 40 && distShort < 40) cell0ok = true;
                }
            }

            let cell1ok = false;
            let upperLong = null, upperShort = null, lowerLong = null, lowerShort = null;
            if (cell1inside.length === 4) {
                const genes = cell1inside.map(c => c.gene);
                if (genes.includes('AA') && genes.includes('aa') && genes.includes('BB') && genes.includes('bb')) {
                    const cell1 = cells[1];
                    const upper = cell1inside.filter(c => chromCenter(c).y < cell1.y);
                    const lower = cell1inside.filter(c => chromCenter(c).y > cell1.y);
                    if (upper.length === 2 && lower.length === 2) {
                        const upperLongChrom = upper.find(c => c.type === 'long');
                        const upperShortChrom = upper.find(c => c.type === 'short');
                        const lowerLongChrom = lower.find(c => c.type === 'long');
                        const lowerShortChrom = lower.find(c => c.type === 'short');
                        if (upperLongChrom && upperShortChrom && lowerLongChrom && lowerShortChrom) {
                            if (upperLongChrom.gene !== lowerLongChrom.gene && upperShortChrom.gene !== lowerShortChrom.gene) {
                                cell1ok = true;
                                upperLong = upperLongChrom.gene;
                                upperShort = upperShortChrom.gene;
                                lowerLong = lowerLongChrom.gene;
                                lowerShort = lowerShortChrom.gene;
                            }
                        }
                    }
                }
            }

            if (cell0ok && cell1ok) {
                aiMessageDiv.innerText = '排列正确 ✅';
                generateSimulation(upperLong, upperShort, lowerLong, lowerShort);
            } else {
                aiMessageDiv.innerText = '染色体排列有误，请检查 ❌';
            }
            drawAll();
        }

        // 模拟次级精母细胞及精细胞
        function generateSimulation(upperLongGene, upperShortGene, lowerLongGene, lowerShortGene) {
            for (let i = 2; i <= 9; i++) simulatedContents[i] = [];

            function getColor(gene) {
                return (gene === 'AA' || gene === 'BB' || gene === 'A' || gene === 'B') ? '#d62728' : '#1f77b4';
            }

            const cell2 = cells[2];
            simulatedContents[2] = [
                { gene: upperLongGene, type: 'long', width: 46, height: 16, color: getColor(upperLongGene), x: cell2.x - 28, y: cell2.y - 10 },
                { gene: upperShortGene, type: 'short', width: 34, height: 16, color: getColor(upperShortGene), x: cell2.x + 6, y: cell2.y + 2 }
            ];

            const cell3 = cells[3];
            const upperLongSingle = upperLongGene.charAt(0);
            const upperShortSingle = upperShortGene.charAt(0);
            simulatedContents[3] = [
                { gene: upperLongSingle, type: 'long', width: 46, height: 16, color: getColor(upperLongSingle), x: cell3.x - 40, y: cell3.y - 20 },
                { gene: upperLongSingle, type: 'long', width: 46, height: 16, color: getColor(upperLongSingle), x: cell3.x - 40, y: cell3.y + 6 },
                { gene: upperShortSingle, type: 'short', width: 34, height: 16, color: getColor(upperShortSingle), x: cell3.x + 10, y: cell3.y - 16 },
                { gene: upperShortSingle, type: 'short', width: 34, height: 16, color: getColor(upperShortSingle), x: cell3.x + 10, y: cell3.y + 10 }
            ];

            const cell4 = cells[4];
            simulatedContents[4] = [
                { gene: lowerLongGene, type: 'long', width: 46, height: 16, color: getColor(lowerLongGene), x: cell4.x - 28, y: cell4.y - 10 },
                { gene: lowerShortGene, type: 'short', width: 34, height: 16, color: getColor(lowerShortGene), x: cell4.x + 6, y: cell4.y + 2 }
            ];

            const cell5 = cells[5];
            const lowerLongSingle = lowerLongGene.charAt(0);
            const lowerShortSingle = lowerShortGene.charAt(0);
            simulatedContents[5] = [
                { gene: lowerLongSingle, type: 'long', width: 46, height: 16, color: getColor(lowerLongSingle), x: cell5.x - 40, y: cell5.y - 20 },
                { gene: lowerLongSingle, type: 'long', width: 46, height: 16, color: getColor(lowerLongSingle), x: cell5.x - 40, y: cell5.y + 6 },
                { gene: lowerShortSingle, type: 'short', width: 34, height: 16, color: getColor(lowerShortSingle), x: cell5.x + 10, y: cell5.y - 16 },
                { gene: lowerShortSingle, type: 'short', width: 34, height: 16, color: getColor(lowerShortSingle), x: cell5.x + 10, y: cell5.y + 10 }
            ];

            const cell6 = cells[6], cell7 = cells[7];
            simulatedContents[6] = [
                { gene: upperLongSingle, type: 'long', width: 32, height: 12, color: getColor(upperLongSingle), x: cell6.x - 22, y: cell6.y - 6 },
                { gene: upperShortSingle, type: 'short', width: 24, height: 12, color: getColor(upperShortSingle), x: cell6.x + 4, y: cell6.y + 2 }
            ];
            simulatedContents[7] = [
                { gene: upperLongSingle, type: 'long', width: 32, height: 12, color: getColor(upperLongSingle), x: cell7.x - 22, y: cell7.y - 6 },
                { gene: upperShortSingle, type: 'short', width: 24, height: 12, color: getColor(upperShortSingle), x: cell7.x + 4, y: cell7.y + 2 }
            ];
            const cell8 = cells[8], cell9 = cells[9];
            simulatedContents[8] = [
                { gene: lowerLongSingle, type: 'long', width: 32, height: 12, color: getColor(lowerLongSingle), x: cell8.x - 22, y: cell8.y - 6 },
                { gene: lowerShortSingle, type: 'short', width: 24, height: 12, color: getColor(lowerShortSingle), x: cell8.x + 4, y: cell8.y + 2 }
            ];
            simulatedContents[9] = [
                { gene: lowerLongSingle, type: 'long', width: 32, height: 12, color: getColor(lowerLongSingle), x: cell9.x - 22, y: cell9.y - 6 },
                { gene: lowerShortSingle, type: 'short', width: 24, height: 12, color: getColor(lowerShortSingle), x: cell9.x + 4, y: cell9.y + 2 }
            ];
        }

        function resetChromosomes() {
            chromosomes = [
                { id: 'AA1', type: 'long', gene: 'AA', color: '#d62728', width: 58, height: 20, x: 720, y: 50 },
                { id: 'aa1', type: 'long', gene: 'aa', color: '#1f77b4', width: 58, height: 20, x: 720, y: 90 },
                { id: 'BB1', type: 'short', gene: 'BB', color: '#d62728', width: 42, height: 20, x: 720, y: 130 },
                { id: 'bb1', type: 'short', gene: 'bb', color: '#1f77b4', width: 42, height: 20, x: 720, y: 170 },
                { id: 'AA2', type: 'long', gene: 'AA', color: '#d62728', width: 58, height: 20, x: 820, y: 50 },
