<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>减数分裂：染色体配对模拟器</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f0f7e8;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            touch-action: pan-y;
        }
        .container {
            background: white;
            border-radius: 32px;
            padding: 30px 20px 20px 20px;
            box-shadow: 0 12px 28px rgba(0, 40, 20, 0.2);
            max-width: 1100px;
            width: fit-content;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            background: #fefef7;
            box-shadow: inset 0 2px 8px #c0d0b0, 0 6px 12px rgba(0,0,0,0.1);
            cursor: grab;
            touch-action: pan-y;
            width: 100%;
            height: auto;
        }
        canvas:active {
            cursor: grabbing;
        }
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
            align-items: center;
            flex-wrap: wrap;
        }
        button {
            background: #2b6e4f;
            border: none;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            padding: 12px 40px;
            border-radius: 48px;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #1b4532, 0 8px 12px rgba(0, 40, 0, 0.3);
            cursor: pointer;
            transition: all 0.08s ease-in;
            border: 1px solid #a5d6b6;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1b4532, 0 5px 10px rgba(0, 40, 0, 0.3);
        }
        .message {
            background: #fff9e0;
            min-width: 280px;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #1e4a2f;
            box-shadow: inset 0 2px 6px #dadbb5, 0 4px 8px #b3c0a0;
            text-align: center;
            border: 1px solid #cfb87c;
        }
        .reset-btn {
            background: #9b6b43;
            box-shadow: 0 4px 0 #624b30, 0 8px 12px rgba(70, 40, 0, 0.2);
            font-size: 1.0rem;
            padding: 10px 25px;
        }
        .footer-note {
            margin-top: 16px;
            color: #3d5a3a;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="meiosisCanvas" width="1000" height="670"></canvas>
    <div class="control-panel">
        <button id="aiCheckBtn">🧬 AI检查</button>
        <div id="aiMessage" class="message">等待检查...</div>
        <button id="resetBtn" class="reset-btn">⟲ 重置染色体</button>
    </div>
    <div class="footer-note">
        ⚡ 拖动两组染色体（红色线段: AA/BB ; 蓝色线段: aa/bb）放入第一排细胞内。点击AI检查验证减I前期配对和后期分离。
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('meiosisCanvas');
        const ctx = canvas.getContext('2d');
        const aiMessageDiv = document.getElementById('aiMessage');

        // ---------- 固定坐标定义 ----------
        const cells = [
            { period: '减I前期', x: 220, y: 130, r: 55 },     // 0
            { period: '减I后期', x: 460, y: 130, r: 55 },     // 1
            { period: '次级1 前期II', x: 220, y: 260, r: 44 }, // 2
            { period: '次级1 后期II', x: 460, y: 260, r: 44 }, // 3
            { period: '次级2 前期II', x: 220, y: 390, r: 44 }, // 4
            { period: '次级2 后期II', x: 460, y: 390, r: 44 }, // 5
            { period: '精细胞1', x: 130, y: 540, r: 26 },      // 6
            { period: '精细胞2', x: 260, y: 540, r: 26 },      // 7
            { period: '精细胞3', x: 400, y: 540, r: 26 },      // 8
            { period: '精细胞4', x: 540, y: 540, r: 26 }       // 9
        ];

        const cellLabels = [
            '减数第一次分裂 前期',   // 0
            '减数第一次分裂 后期',   // 1
            '次级精母细胞1 前期II', // 2
            '次级精母细胞1 后期II', // 3
            '次级精母细胞2 前期II', // 4
            '次级精母细胞2 后期II', // 5
            '精细胞1',              // 6
            '精细胞2',              // 7
            '精细胞3',              // 8
            '精细胞4'               // 9
        ];

        // ---------- 染色体数据 ----------
        let chromosomes = [
            { id: 'AA1', type: 'long', gene: 'AA', color: '#d62728', width: 58, height: 20, x: 720, y: 50 },
            { id: 'aa1', type: 'long', gene: 'aa', color: '#1f77b4', width: 58, height: 20, x: 720, y: 90 },
            { id: 'BB1', type: 'short', gene: 'BB', color: '#d62728', width: 42, height: 20, x: 720, y: 130 },
            { id: 'bb1', type: 'short', gene: 'bb', color: '#1f77b4', width: 42, height: 20, x: 720, y: 170 },
            { id: 'AA2', type: 'long', gene: 'AA', color: '#d62728', width: 58, height: 20, x: 820, y: 50 },
            { id: 'aa2', type: 'long', gene: 'aa', color: '#1f77b4', width: 58, height: 20, x: 820, y: 90 },
            { id: 'BB2', type: 'short', gene: 'BB', color: '#d62728', width: 42, height: 20, x: 820, y: 130 },
            { id: 'bb2', type: 'short', gene: 'bb', color: '#1f77b4', width: 42, height: 20, x: 820, y: 170 }
        ];

        // 存储模拟的后面细胞 (2-9) 内显示的染色体
        let simulatedContents = { 2: [], 3: [], 4: [], 5: [], 6: [], 7: [], 8: [], 9: [] };

        // 拖拽状态
        let draggingIndex = -1;
        let dragOffsetX = 0, dragOffsetY = 0;

        // ---------- 辅助函数：将触摸/鼠标事件统一转换为画布坐标 ----------
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            return { x: canvasX, y: canvasY };
        }

        // 判断点是否在某个染色体上（使用矩形检测区域）
        function getChromosomeAt(x, y) {
            for (let i = chromosomes.length - 1; i >= 0; i--) {
                const ch = chromosomes[i];
                if (x >= ch.x && x <= ch.x + ch.width &&
                    y >= ch.y && y <= ch.y + ch.height) {
                    return i;
                }
            }
            return -1;
        }

        // ---------- 统一拖拽开始函数 ----------
        function startDrag(e) {
            const { x, y } = getCanvasCoords(e);
            const idx = getChromosomeAt(x, y);
            if (idx !== -1) {
                e.preventDefault();
                draggingIndex = idx;
                const ch = chromosomes[idx];
                dragOffsetX = x - ch.x;
                dragOffsetY = y - ch.y;
                canvas.style.cursor = 'grabbing';
                drawAll();
            }
        }

        function moveDrag(e) {
            if (draggingIndex === -1) return;
            e.preventDefault();
            const { x, y } = getCanvasCoords(e);
            const ch = chromosomes[draggingIndex];
            ch.x = x - dragOffsetX;
            ch.y = y - dragOffsetY;
            ch.x = Math.max(0, Math.min(canvas.width - ch.width, ch.x));
            ch.y = Math.max(0, Math.min(canvas.height - ch.height, ch.y));
            drawAll();
        }

        function endDrag(e) {
            if (draggingIndex !== -1) {
                draggingIndex = -1;
                canvas.style.cursor = 'grab';
                drawAll();
            }
        }

        function cancelDrag(e) {
            if (draggingIndex !== -1) {
                draggingIndex = -1;
                canvas.style.cursor = 'grab';
                drawAll();
            }
        }

        // ---------- 事件绑定 ----------
        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', moveDrag);
        canvas.addEventListener('mouseup', endDrag);
        canvas.addEventListener('mouseleave', endDrag);
        canvas.addEventListener('touchstart', startDrag, { passive: false });
        canvas.addEventListener('touchmove', moveDrag, { passive: false });
        canvas.addEventListener('touchend', endDrag);
        canvas.addEventListener('touchcancel', cancelDrag);
        canvas.style.cursor = 'grab';

        // ---------- 辅助函数：圆内检测、中心点等 ----------
        function isPointInCircle(px, py, cx, cy, r) {
            const dx = px - cx, dy = py - cy;
            return dx * dx + dy * dy <= r * r;
        }

        function chromCenter(chrom) {
            return { x: chrom.x + chrom.width/2, y: chrom.y + chrom.height/2 };
        }

        function getChromosomesInsideCircle(circleIndex) {
            const cell = cells[circleIndex];
            const inside = [];
            chromosomes.forEach((ch, idx) => {
                const center = chromCenter(ch);
                if (isPointInCircle(center.x, center.y, cell.x, cell.y, cell.r)) {
                    inside.push({ ...ch, index: idx });
                }
            });
            return inside;
        }

        // 绘制X形染色体上的两个基因字母（上面的字母在染色体上方，下面的字母在染色体下方）
        function drawXChromosomeLetters(chrom, fontSize, gene) {
            if (gene.length !== 2) return;
            const x = chrom.x, y = chrom.y, w = chrom.width, h = chrom.height;
            // 上面的字母：基线在 y - 5，完全位于染色体上方
            const x1 = x + 6;
            const y1 = y - 5;
            // 下面的字母：基线在 y + h + 5，完全位于染色体下方
            const x2 = x + 6;
            const y2 = y + h + 5;

            ctx.font = `bold ${fontSize}px "Courier New", monospace`;
            ctx.fillStyle = '#111';
            ctx.shadowColor = '#00000060';
            ctx.shadowBlur = 4;
            ctx.fillText(gene[0], x1, y1);
            ctx.fillText(gene[1], x2, y2);
            ctx.shadowBlur = 0;
        }

        // ---------- 绘制函数 ----------
        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 绘制细胞圆圈
            for (let i = 0; i < cells.length; i++) {
                const c = cells[i];
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r, 0, 2 * Math.PI);
                ctx.fillStyle = '#f2fae6';
                ctx.fill();
                ctx.strokeStyle = '#2b5e3a';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                let offset = (i === 0 || i === 1) ? 18 : (i >= 6 ? 18 : 22);
                ctx.font = i >= 6 ? 'bold 13px "Segoe UI", sans-serif' : 'bold 14px "Segoe UI", sans-serif';
                ctx.fillStyle = '#1d4d2d';
                ctx.textAlign = 'center';
                ctx.fillText(cellLabels[i], c.x, c.y + c.r + offset);
            }

            // 2. 绘制赤道面虚线
            ctx.save();
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 3]);
            let c = cells[1];
            ctx.beginPath();
            ctx.moveTo(c.x - c.r, c.y);
            ctx.lineTo(c.x + c.r, c.y);
            ctx.stroke();
            c = cells[3];
            ctx.beginPath();
            ctx.moveTo(c.x - c.r, c.y);
            ctx.lineTo(c.x + c.r, c.y);
            ctx.stroke();
            c = cells[5];
            ctx.beginPath();
            ctx.moveTo(c.x - c.r, c.y);
            ctx.lineTo(c.x + c.r, c.y);
            ctx.stroke();
            ctx.restore();

            // 3. 绘制所有静态模拟细胞内容 (2-9)
            for (let i = 2; i <= 9; i++) {
                const list = simulatedContents[i] || [];
                for (let chrom of list) {
                    if (i === 2 || i === 4) {
                        // 前期II: 用X形线段表示 (两条交叉线)
                        ctx.save();
                        ctx.strokeStyle = chrom.color;
                        ctx.lineWidth = 3;
                        ctx.shadowColor = '#40202020';
                        ctx.shadowBlur = 6;
                        // 从左上到右下
                        ctx.beginPath();
                        ctx.moveTo(chrom.x, chrom.y);
                        ctx.lineTo(chrom.x + chrom.width, chrom.y + chrom.height);
                        ctx.stroke();
                        // 从右上到左下
                        ctx.beginPath();
                        ctx.moveTo(chrom.x + chrom.width, chrom.y);
                        ctx.lineTo(chrom.x, chrom.y + chrom.height);
                        ctx.stroke();
                        ctx.restore();

                        // 基因字母分开标注 (双字母，分别在上方和下方)
                        drawXChromosomeLetters(chrom, 20, chrom.gene);
                    } else {
                        // 后期II (3,5) 和精细胞 (6-9): 水平线条 (I形)
                        ctx.save();
                        ctx.strokeStyle = chrom.color;
                        ctx.lineWidth = 3;
                        ctx.shadowColor = '#40202020';
                        ctx.shadowBlur = 6;
                        const midY = chrom.y + chrom.height/2;
                        ctx.beginPath();
                        ctx.moveTo(chrom.x, midY);
                        ctx.lineTo(chrom.x + chrom.width, midY);
                        ctx.stroke();
                        ctx.restore();

                        // 基因字母 (单字母) - 字号20px，标注在线条上方
                        ctx.font = 'bold 20px "Courier New", monospace';
                        ctx.fillStyle = '#111';
                        ctx.shadowColor = '#00000060';
                        ctx.shadowBlur = 4;
                        let geneText = chrom.gene.charAt(0);
                        ctx.fillText(geneText, chrom.x + chrom.width/2 - 9, midY - 10);
                        ctx.shadowBlur = 0;
                    }
                }
            }

            // 4. 绘制可拖动的染色体 (全部用X形线段，基因字母分开标注，分别在上方和下方)
            for (let i = 0; i < chromosomes.length; i++) {
                const ch = chromosomes[i];
                ctx.save();
                ctx.strokeStyle = ch.color;
                ctx.lineWidth = 4;
                ctx.shadowColor = '#604020';
                ctx.shadowBlur = 8;
                // 左上到右下
                ctx.beginPath();
                ctx.moveTo(ch.x, ch.y);
                ctx.lineTo(ch.x + ch.width, ch.y + ch.height);
                ctx.stroke();
                // 右上到左下
                ctx.beginPath();
                ctx.moveTo(ch.x + ch.width, ch.y);
                ctx.lineTo(ch.x, ch.y + ch.height);
                ctx.stroke();
                ctx.restore();

                // 基因字母分开标注 (双字母，分别在上方和下方)
                drawXChromosomeLetters(ch, 22, ch.gene);
            }

            // 5. 提示文字
            ctx.font = 'italic 16px "Segoe UI", sans-serif';
            ctx.fillStyle = '#3d6230';
            ctx.fillText('染色体库 (红色线段:AA/BB, 蓝色线段:aa/bb)', 650, 230);
        }

        // 清空后续细胞模拟内容
        function clearSimulatedContents() {
            for (let i = 2; i <= 9; i++) {
                simulatedContents[i] = [];
            }
        }

        // ---------- AI 检查逻辑（带详细错误提示）----------
        function aiCheck() {
            const cell0inside = getChromosomesInsideCircle(0);
            const cell1inside = getChromosomesInsideCircle(1);

            // 先清空错误时可能遗留的模拟内容（正确时会在最后生成）
            clearSimulatedContents();

            // 检查细胞0 (减I前期)
            if (cell0inside.length !== 4) {
                aiMessageDiv.innerText = '减数第一次分裂前期细胞内染色体数量错误（应为4条） ❌';
                drawAll();
                return;
            }

            const genes0 = cell0inside.map(c => c.gene);
            const hasAA = genes0.includes('AA');
            const hasaa = genes0.includes('aa');
            const hasBB = genes0.includes('BB');
            const hasbb = genes0.includes('bb');
            if (!(hasAA && hasaa && hasBB && hasbb)) {
                aiMessageDiv.innerText = '减数第一次分裂前期同源染色体配对不足（缺少某种基因） ❌';
                drawAll();
                return;
            }

            const chromAA = cell0inside.find(c => c.gene === 'AA');
            const chromaa = cell0inside.find(c => c.gene === 'aa');
            const chromBB = cell0inside.find(c => c.gene === 'BB');
            const chrombb = cell0inside.find(c => c.gene === 'bb');
            const distLong = Math.hypot(chromAA.x - chromaa.x, chromAA.y - chromaa.y);
            const distShort = Math.hypot(chromBB.x - chrombb.x, chromBB.y - chrombb.y);
            if (distLong >= 40) {
                aiMessageDiv.innerText = '减数第一次分裂前期同源染色体未配对（AA和aa距离过远） ❌';
                drawAll();
                return;
            }
            if (distShort >= 40) {
                aiMessageDiv.innerText = '减数第一次分裂前期同源染色体未配对（BB和bb距离过远） ❌';
                drawAll();
                return;
            }

            // 检查细胞1 (减I后期)
            if (cell1inside.length !== 4) {
                aiMessageDiv.innerText = '减数第一次分裂后期细胞内染色体数量错误（应为4条） ❌';
                drawAll();
                return;
            }

            const genes1 = cell1inside.map(c => c.gene);
            if (!(genes1.includes('AA') && genes1.includes('aa') && genes1.includes('BB') && genes1.includes('bb'))) {
                aiMessageDiv.innerText = '减数第一次分裂后期染色体种类不完整（缺少某种基因） ❌';
                drawAll();
                return;
            }

            const cell1 = cells[1];
            const upper = cell1inside.filter(c => chromCenter(c).y < cell1.y);
            const lower = cell1inside.filter(c => chromCenter(c).y > cell1.y);
            if (upper.length !== 2 || lower.length !== 2) {
                aiMessageDiv.innerText = '减数第一次分裂后期染色体未正确分到两极（每极应为2条） ❌';
                drawAll();
                return;
            }

            const upperLong = upper.find(c => c.type === 'long');
            const upperShort = upper.find(c => c.type === 'short');
            const lowerLong = lower.find(c => c.type === 'long');
            const lowerShort = lower.find(c => c.type === 'short');
            if (!upperLong || !upperShort || !lowerLong || !lowerShort) {
                // 第8种错误：原“每极缺少长/短染色体”，现改为“同源染色体未分离”
                aiMessageDiv.innerText = '减数第一次分裂后期同源染色体未分离 ❌';
                drawAll();
                return;
            }

            if (upperLong.gene === lowerLong.gene || upperShort.gene === lowerShort.gene) {
                // 第9种错误：原“同源染色体未分离”，现改为“染色体排列错误”
                aiMessageDiv.innerText = '减数第一次分裂后期染色体排列错误 ❌';
                drawAll();
                return;
            }

            // 所有检查通过
            aiMessageDiv.innerText = '排列正确 ✅';
            generateSimulation(upperLong.gene, upperShort.gene, lowerLong.gene, lowerShort.gene);
            drawAll();
        }

        // 模拟次级精母细胞及精细胞 (全部用线段)
        function generateSimulation(upperLongGene, upperShortGene, lowerLongGene, lowerShortGene) {
            // 先清空（虽然调用前已清空，但保险）
            for (let i = 2; i <= 9; i++) simulatedContents[i] = [];

            function getColor(gene) {
                return (gene === 'AA' || gene === 'BB' || gene === 'A' || gene === 'B') ? '#d62728' : '#1f77b4';
            }

            // 细胞2: 次级1 前期II (拉大上下间距)
            const cell2 = cells[2];
            simulatedContents[2] = [
                { gene: upperLongGene, type: 'long', width: 46, height: 16, color: getColor(upperLongGene), x: cell2.x - 28, y: cell2.y - 15 },
                { gene: upperShortGene, type: 'short', width: 34, height: 16, color: getColor(upperShortGene), x: cell2.x + 6, y: cell2.y + 10 }
            ];

            const cell3 = cells[3];
            const upperLongSingle = upperLongGene.charAt(0);
            const upperShortSingle = upperShortGene.charAt(0);
            simulatedContents[3] = [
                { gene: upperLongSingle, type: 'long', width: 46, height: 16, color: getColor(upperLongSingle), x: cell3.x - 40, y: cell3.y - 20 },
                { gene: upperLongSingle, type: 'long', width: 46, height: 16, color: getColor(upperLongSingle), x: cell3.x - 40, y: cell3.y + 6 },
                { gene: upperShortSingle, type: 'short', width: 34, height: 16, color: getColor(upperShortSingle), x: cell3.x + 10, y: cell3.y - 16 },
                { gene: upperShortSingle, type: 'short', width: 34, height: 16, color: getColor(upperShortSingle), x: cell3.x + 10, y: cell3.y + 10 }
            ];

            // 细胞4: 次级2 前期II (拉大上下间距)
            const cell4 = cells[4];
            simulatedContents[4] = [
                { gene: lowerLongGene, type: 'long', width: 46, height: 16, color: getColor(lowerLongGene), x: cell4.x - 28, y: cell4.y - 15 },
                { gene: lowerShortGene, type: 'short', width: 34, height: 16, color: getColor(lowerShortGene), x: cell4.x + 6, y: cell4.y + 10 }
            ];

            const cell5 = cells[5];
            const lowerLongSingle = lowerLongGene.charAt(0);
            const lowerShortSingle = lowerShortGene.charAt(0);
            simulatedContents[5] = [
                { gene: lowerLongSingle, type: 'long', width: 46, height: 16, color: getColor(lowerLongSingle), x: cell5.x - 40, y: cell5.y - 20 },
                { gene: lowerLongSingle, type: 'long', width: 46, height: 16, color: getColor(lowerLongSingle), x: cell5.x - 40, y: cell5.y + 6 },
                { gene: lowerShortSingle, type: 'short', width: 34, height: 16, color: getColor(lowerShortSingle), x: cell5.x + 10, y: cell5.y - 16 },
                { gene: lowerShortSingle, type: 'short', width: 34, height: 16, color: getColor(lowerShortSingle), x: cell5.x + 10, y: cell5.y + 10 }
            ];

            const cell6 = cells[6], cell7 = cells[7];
            simulatedContents[6] = [
                { gene: upperLongSingle, type: 'long', width: 32, height: 12, color: getColor(upperLongSingle), x: cell6.x - 22, y: cell6.y - 6 },
                { gene: upperShortSingle, type: 'short', width: 24, height: 12, color: getColor(upperShortSingle), x: cell6.x + 4, y: cell6.y + 2 }
            ];
            simulatedContents[7] = [
